<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<th:block th:fragment="content">
<div class="header">
  <h1>ログイン</h1>
</div>

<div th:if="${flash != null and !#strings.isEmpty(flash)}" id="notice-message" class="alert alert-danger" th:text="${flash}"></div>

<div class="submit">
  <form method="post" action="/login">
    <div class="form-account-name">
      <span>アカウント名</span>
      <input type="text" name="account_name">
    </div>
    <div class="form-password">
      <span>パスワード</span>
      <input type="password" name="password">
    </div>
    <div class="form-submit">
      <input type="submit" name="submit" value="submit">
    </div>
  </form>
</div>

<div class="isu-register">
  <a href="/register">ユーザー登録</a>
</div>
</th:block>
</html>
