<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<th:block th:fragment="content">
<div class="isu-submit">
  <form method="post" action="/" enctype="multipart/form-data">
    <div class="isu-form">
      <input type="file" name="file" value="file">
    </div>
    <div class="isu-form">
      <textarea name="body"></textarea>
    </div>
    <div class="form-submit">
      <input type="hidden" name="csrf_token" th:value="${csrfToken}">
      <input type="submit" name="submit" value="submit">
    </div>
    <div th:if="${flash != null and !#strings.isEmpty(flash)}" id="notice-message" class="alert alert-danger" th:text="${flash}"></div>
  </form>
</div>

<th:block th:replace="~{posts :: posts(${posts})}"></th:block>

<div id="isu-post-more">
  <button id="isu-post-more-btn">もっと見る</button>
  <img class="isu-loading-icon" src="/img/ajax-loader.gif">
</div>
</th:block>
</html>
