<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<th:block th:fragment="content">
<div>
  <form method="post" action="/admin/banned">
    <div th:each="user : ${users}">
      <input type="checkbox" name="uid[]" th:id="'uid_' + ${user.id}" th:value="${user.id}" th:data-account-name="${user.accountName}">
      <label th:for="'uid_' + ${user.id}" th:text="${user.accountName}"></label>
    </div>
    <div class="form-submit">
      <input type="hidden" name="csrf_token" th:value="${csrfToken}">
      <input type="submit" name="submit" value="submit">
    </div>
  </form>
</div>
</th:block>
</html>
