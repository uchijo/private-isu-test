server.port=8080
server.servlet.session.cookie.name=isuconp-java.session
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.url=jdbc:mysql://${ISUCONP_DB_HOST:localhost}:${ISUCONP_DB_PORT:3306}/${ISUCONP_DB_NAME:isuconp}?characterEncoding=utf8&connectionTimeZone=LOCAL&forceConnectionTimeZoneToSession=false
spring.datasource.username=${ISUCONP_DB_USER:root}
spring.datasource.password=${ISUCONP_DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10
spring.thymeleaf.cache=true
